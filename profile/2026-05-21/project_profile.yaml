audit_attention_flags:
  - id: drift-status-roadmap-vs-commit
    description: |
      STATUS.md and ROADMAP.md describe the user-agnostic refactor as the
      pending immediate next step ("Immediate Next Steps #1: User-agnostic
      refactor commit — replace WYN OPS accent comments with neutral wording";
      "Phase 1 — User-Agnostic Refactor"). But commit e6257aa
      ("refactor: remove user-specific accent branding from tutor") shows the
      refactor has been performed; current `shelltutor` script contains no
      `WYN OPS` references and the named lines (17, 35) carry neutral content.
      This is documentation drift, not deliberate posture, and aligns with the
      operator-selected strategic theme "documentation–code consistency".
    evidence:
      - path: STATUS.md
        lines: "31-46"
      - path: ROADMAP.md
        lines: "30-46"
      - path: shelltutor
        lines: "17,35"
    target_audit_phase: 1
    reason: "Documentation claims contradicted by source state; affects Phase-1 vocabulary/claims and the documentation–code consistency theme."
    raised_at: "2026-05-21"
    resolved_in_cycle: null
  - id: subshell-safety-claim-vs-shell-authority
    description: |
      Welcome screen tells the learner "Everything happens in ~/.shelltutor;
      you cannot break anything." (shelltutor:169). The implementation drops
