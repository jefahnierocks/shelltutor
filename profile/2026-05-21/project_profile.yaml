# ---------- PROJECT ----------
project:
  name: shelltutor
  kind: app
  primary_purpose: |
    Self-contained, single-file interactive tutor for the Unix shell. Teaches
    the first ~15 commands a learner needs (pwd, ls, cd, cat, man, whoami,
    hostname, date, uptime, df, free, and friends) through nine lessons,
    each followed by a real bash subshell in a per-learner sandbox. Project
    is intentionally user-agnostic: no operator name, host, distro, theme,
    or pre-existing shell setup is assumed.
  repository:
    root: "/Users/verlyn13/Organizations/jefahnierocks/shelltutor"
    remote: "git@github.com:jefahnierocks/shelltutor.git"
    default_branch: main
  deployable_units:
    - name: shelltutor
      path: shelltutor
      kind: cli
      runtime: "bash 4+"
      entrypoint: shelltutor
      evidence:
        - path: shelltutor
          lines: "1-2"
          evidence: "#!/usr/bin/env bash | shelltutor — a vimtutor-style introduction to the Unix shell."
        - path: shelltutor
          lines: "412-459"
          evidence: "main() dispatcher; -h flag; 1-9 lesson indices; default behaviour resumes from .progress."

