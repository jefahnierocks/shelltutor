# ---------- SCOPE, STRATEGY, AND DEBT ----------
scope:
  include_paths:
    - shelltutor
    - README.md
    - AGENTS.md
    - CLAUDE.md
    - CONTRIBUTING.md
    - STATUS.md
    - ROADMAP.md
    - .editorconfig
    - .gitignore
  exclude_paths:
    - .git/
    - profile/
    - docs/audit/directives/agentic-architecture-audit-v3.1-package/
  focus_question: |
    Does the sandbox-safety claim hold? The tutor tells the learner
    "Everything happens in ~/.shelltutor; you cannot break anything"
    (shelltutor:169) and the practice subshell `cd`s to $SANDBOX and
    sandboxes HISTFILE (shelltutor:109-117), but the subshell is otherwise
    a real interactive bash with the learner's normal filesystem authority.
    Audit whether the claim and the implementation agree at the level a
    beginner is likely to test (cd .., rm, etc.) and whether documentation
    should narrow the claim or implementation should tighten the sandbox.
  audit_cadence: unknown

strategic_themes:
  - name: "Single-file portability"
    description: |
      Tutor is one bash script that must run on a clean Linux or macOS terminal
      with no prerequisite installation beyond bash. Audit weighting should
      favor checks for contract discipline (Phase 4) and vocabulary clarity
      around "portable across Linux and macOS" (Phase 1), particularly at the
      lesson-content level where Linux-only or distro-specific surfaces leak
      in (see audit_attention_flags[lesson-portability-gaps]).
    weighting:
      dimensions: []
      multiplier: 1.5
    source: operator-interview
    evidence:
      path: null
      lines: null
    unchanged_since: first-snapshot
  - name: "Documentation–code consistency"
    description: |
      Project ships a deliberate documentation set (README, AGENTS, CLAUDE,
      CONTRIBUTING, STATUS, ROADMAP). The recent refactor commit (e6257aa)
      removed user-specific accent branding from the script but downstream
      docs still list user-agnostic refactor as the immediate next step.
      Audit weighting should favor vocabulary/claims checks (Phase 1) and
      documentation-as-policy checks (Phase 8) to catch drift between
      documentation claims and source state.
    weighting:
      dimensions: []
      multiplier: 1.5
    source: operator-interview
    evidence:
      path: null
      lines: null
    unchanged_since: first-snapshot

